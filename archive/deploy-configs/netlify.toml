# Netlify конфигурация для деплоя
# Документация: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

# SPA роутинг - все запросы перенаправляются на index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Кэширование для ассетов
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Переменные окружения
[build.environment]
  NODE_VERSION = "20"

# Плагины (опционально)
# [[plugins]]
#   package = "@netlify/plugin-lighthouse"
