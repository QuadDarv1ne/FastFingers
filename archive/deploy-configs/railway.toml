# Railway конфигурация для деплоя
# Документация: https://docs.railway.app/deploy/static-sites

# Railway автоматически определяет Vite проект
# Настройки в веб-панели:
# - Build Command: npm run build
# - Start Command: npx serve dist
# - Root Directory: .

# Опционально: railway.toml для Infrastructure as Code

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npx serve dist"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.envs]
NODE_VERSION = "20"
NPM_FLAGS = "--production=false"
