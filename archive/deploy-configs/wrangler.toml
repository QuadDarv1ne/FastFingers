# Wrangler конфигурация для Cloudflare Pages
# Документация: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "fastfingers"
compatibility_date = "2024-01-01"

[site]
bucket = "./dist"

[build]
command = "npm run build"

# Опционально: переменные окружения
# [vars]
