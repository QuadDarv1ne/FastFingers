<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastFingers — Тренажёр слепой печати</title>
  <style>
    /* ===== Базовые стили ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-card: #16162a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --text-muted: #6b6b80;
      --primary: #7c3aed;
      --primary-light: #8b5cf6;
      --primary-dark: #6d28d9;
      --success: #22c55e;
      --error: #ef4444;
      --border: #2a2a4a;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      --transition: all 0.2s ease;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .widget-container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* ===== Карточки ===== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      transition: var(--transition);
    }

    .card:hover {
      border-color: var(--primary);
      box-shadow: 0 6px 24px rgba(124, 58, 237, 0.15);
    }

    /* ===== Заголовки ===== */
    h1 {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* ===== Статистика ===== */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      transition: var(--transition);
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary-light);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    /* ===== Область текста ===== */
    .text-display {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 24px;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 20px;
      line-height: 1.8;
      min-height: 180px;
      position: relative;
      cursor: text;
      transition: var(--transition);
      border: 1px solid var(--border);
    }

    .text-display:hover, .text-display:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .char {
      position: relative;
      padding: 2px 1px;
      border-radius: 3px;
      transition: all 0.1s;
    }

    .char.correct {
      color: var(--success);
    }

    .char.incorrect {
      color: var(--error);
      background: rgba(239, 68, 68, 0.2);
      text-decoration: underline wavy var(--error);
    }

    .char.current {
      background: var(--primary);
      color: white;
      animation: pulse 1s infinite;
      border-radius: 4px;
    }

    .char.current::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--primary-light);
      animation: blink 1s infinite;
    }

    .char.pending {
      color: var(--text-muted);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ===== Скрытый инпут ===== */
    #hidden-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    /* ===== Контролы ===== */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .control-group {
      flex: 1;
      min-width: 140px;
    }

    label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    select, button {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }

    select:hover, button:hover {
      border-color: var(--primary);
      background: var(--bg-card);
    }

    select:focus, button:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
    }

    button.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      color: white;
    }

    button.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    /* ===== Прогресс бар ===== */
    .progress-container {
      margin-top: 20px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .progress-bar {
      height: 8px;
      background: var(--bg-secondary);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    /* ===== Клавиатура ===== */
    .keyboard {
      margin-top: 20px;
      user-select: none;
      -webkit-user-select: none;
    }

    .keyboard-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .key {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      transition: all 0.1s;
      text-transform: uppercase;
    }

    .key.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary-light);
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(124, 58, 237, 0.5);
    }

    .key.correct {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .key.error {
      background: var(--error);
      border-color: var(--error);
      color: white;
    }

    .key-space {
      width: 260px;
    }

    /* ===== Уведомления ===== */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      transform: translateX(400px);
      transition: transform 0.3s ease;
      z-index: 1000;
      max-width: 320px;
    }

    .notification.show {
      transform: translateX(0);
    }

    .notification.success {
      border-color: var(--success);
    }

    .notification.error {
      border-color: var(--error);
    }

    /* ===== Адаптивность ===== */
    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 16px;
      }

      h1 {
        font-size: 22px;
      }

      .text-display {
        font-size: 16px;
        padding: 16px;
      }

      .key {
        width: 34px;
        height: 36px;
        font-size: 11px;
      }

      .key-space {
        width: 180px;
      }

      .stat-value {
        font-size: 22px;
      }

      .stats-row {
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }

      .stat-card {
        padding: 12px 8px;
      }

      .controls {
        flex-direction: column;
      }

      .control-group {
        min-width: 100%;
      }
    }

    /* ===== Экран завершения ===== */
    .completion-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 15, 26, 0.98);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 10;
    }

    .completion-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .completion-content {
      text-align: center;
      padding: 40px;
      max-width: 400px;
    }

    .completion-icon {
      font-size: 64px;
      margin-bottom: 16px;
      animation: bounce 0.6s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .completion-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--success), #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .completion-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 24px 0;
    }

    .completion-stat {
      background: var(--bg-secondary);
      padding: 14px;
      border-radius: 10px;
    }

    .completion-stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary-light);
    }

    .completion-stat-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* ===== Доступность ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ===== Фокус для клавиатуры ===== */
    .text-display:focus-within {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="widget-container" role="application" aria-label="Тренажёр слепой печати">
    <h1>⌨️ FastFingers</h1>
    <p class="subtitle">Тренажёр слепой десятипальцевой печати</p>

    <!-- Статистика -->
    <div class="stats-row" role="region" aria-label="Статистика печати">
      <div class="stat-card">
        <div class="stat-value" id="wpm" aria-label="Слов в минуту">0</div>
        <div class="stat-label">WPM</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="cpm" aria-label="Символов в минуту">0</div>
        <div class="stat-label">CPM</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="accuracy" aria-label="Точность">100</div>
        <div class="stat-label">Точность %</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="errors" aria-label="Ошибки">0</div>
        <div class="stat-label">Ошибки</div>
      </div>
    </div>

    <!-- Область печати -->
    <div class="card" role="region" aria-label="Область печати">
      <div 
        class="text-display" 
        id="text-display" 
        onclick="focusInput()"
        tabindex="0"
        role="textbox"
        aria-label="Текст для печати"
        aria-live="polite"
      >
        <div id="text-content"></div>

        <!-- Экран завершения -->
        <div class="completion-overlay" id="completion-overlay" role="dialog" aria-modal="true" aria-label="Упражнение завершено">
          <div class="completion-content">
            <div class="completion-icon" aria-hidden="true">🎉</div>
            <div class="completion-title">Отлично!</div>
            <p style="color: var(--text-secondary); margin: 8px 0 24px;">Упражнение завершено</p>
            <div class="completion-stats">
              <div class="completion-stat">
                <div class="completion-stat-value" id="final-wpm">0</div>
                <div class="completion-stat-label">WPM</div>
              </div>
              <div class="completion-stat">
                <div class="completion-stat-value" id="final-accuracy">100</div>
                <div class="completion-stat-label">Точность</div>
              </div>
              <div class="completion-stat">
                <div class="completion-stat-value" id="final-time">0с</div>
                <div class="completion-stat-label">Время</div>
              </div>
            </div>
            <button class="primary" onclick="initExercise()" style="max-width: 200px;">
              Продолжить →
            </button>
          </div>
        </div>
      </div>

      <!-- Прогресс -->
      <div class="progress-container">
        <div class="progress-label">
          <span>Прогресс</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
      </div>

      <!-- Контролы -->
      <div class="controls" role="group" aria-label="Настройки упражнения">
        <div class="control-group">
          <label for="category-select">Категория</label>
          <select id="category-select" onchange="changeCategory(this.value)" aria-label="Выберите категорию">
            <option value="all">🎲 Случайные слова</option>
            <option value="basic">⌨️ Основной ряд</option>
            <option value="upper">⬆️ Верхний ряд</option>
            <option value="lower">⬇️ Нижний ряд</option>
            <option value="words">📝 Слова</option>
            <option value="sentences">📄 Предложения</option>
          </select>
        </div>
        <div class="control-group">
          <label for="difficulty-select">Сложность</label>
          <select id="difficulty-select" onchange="changeDifficulty(this.value)" aria-label="Выберите сложность">
            <option value="1">⭐ Очень легко</option>
            <option value="3">⭐⭐ Легко</option>
            <option value="5" selected>⭐⭐⭐ Средне</option>
            <option value="7">⭐⭐⭐⭐ Сложно</option>
            <option value="9">⭐⭐⭐⭐⭐ Очень сложно</option>
          </select>
        </div>
        <div class="control-group" style="display: flex; align-items: flex-end;">
          <button class="primary" onclick="initExercise()" title="Новое упражнение" aria-label="Новое упражнение">
            🔄 Новое
          </button>
        </div>
      </div>
    </div>

    <!-- Виртуальная клавиатура -->
    <div class="card keyboard" role="region" aria-label="Виртуальная клавиатура">
      <div id="keyboard-container"></div>
    </div>
  </div>

  <!-- Скрытый инпут для захвата ввода -->
  <input 
    type="text" 
    id="hidden-input" 
    autocomplete="off" 
    autocorrect="off" 
    autocapitalize="off" 
    spellcheck="false"
    aria-hidden="true"
  >

  <!-- Уведомления -->
  <div class="notification" id="notification" role="alert" aria-live="polite">
    <span id="notification-icon" aria-hidden="true">✓</span>
    <span id="notification-text">Готово!</span>
  </div>

  <script>
    'use strict';

    // ===== Данные =====
    const WORDS = Object.freeze({
      easy: ['он', 'она', 'оно', 'мы', 'вы', 'они', 'там', 'тут', 'вот', 'как', 'так', 'где', 'кто', 'что', 'мир', 'дом', 'лес', 'кот', 'год', 'рот', 'нос', 'лёд', 'мёд', 'сон', 'дым'],
      medium: ['привет', 'работа', 'книга', 'письмо', 'экран', 'окно', 'дверь', 'стол', 'стул', 'ручка', 'бумага', 'карта', 'город', 'река', 'море', 'поле', 'гора', 'луна', 'звезда', 'птица'],
      hard: ['программирование', 'клавиатура', 'монитор', 'интернет', 'телефон', 'камера', 'музыка', 'картина', 'история', 'победа', 'удача', 'здоровье', 'счастье', 'свобода', 'правосудие']
    });

    const EXERCISES = Object.freeze({
      basic: [
        'авып авып авып авып авып авып авып авып авып авып',
        'орлд орлд орлд орлд орлд орлд орлд орлд орлд орлд',
        'авып орлд авып орлд выап лдро паыв длро выап лдро'
      ],
      upper: [
        'йцуке йцуке йцуке йцуке йцуке йцуке йцуке йцуке',
        'нгшщз нгшщз нгшщз нгшщз нгшщз нгшщз нгшщз нгшщз',
        'йцуке нгшщз йцуке нгшщз еукцы зщшгн еукцы зщшгн'
      ],
      lower: [
        'ячсми ячсми ячсми ячсми ячсми ячсми ячсми ячсми',
        'тьбю. тьбю. тьбю. тьбю. тьбю. тьбю. тьбю. тьбю.',
        'ячсми тьбю. ячсми тьбю. имсча .юбьт имсча .юбьт'
      ],
      words: [
        'мама папа рама окно дом лес кот мир труд май',
        'привет работа книга письмо экран клавиатура мышка',
        'солнце небо земля вода огонь ветер камень цветок дерево'
      ],
      sentences: [
        'На дворе трава, на траве дрова.',
        'Не руби дрова на траве двора.',
        'Съешь ещё этих мягких французских булок, да выпей чаю.',
        'В чащах юга жил бы цитрус? Да, но фальшивый экземпляр!'
      ]
    });

    const KEYBOARD_LAYOUT = Object.freeze([
      ['й', 'ц', 'у', 'к', 'е', 'н', 'г', 'ш', 'щ', 'з', 'х', 'ъ'],
      ['ф', 'ы', 'в', 'а', 'п', 'р', 'о', 'л', 'д', 'ж', 'э', 'ё'],
      ['я', 'ч', 'с', 'м', 'и', 'т', 'ь', 'б', 'ю', '.']
    ]);

    // ===== DOM элементы =====
    const elements = {
      wpm: null,
      cpm: null,
      accuracy: null,
      errors: null,
      textContent: null,
      completionOverlay: null,
      finalWpm: null,
      finalAccuracy: null,
      finalTime: null,
      progressPercent: null,
      progressFill: null,
      progressBar: null,
      hiddenInput: null,
      notification: null,
      notificationIcon: null,
      notificationText: null,
      keys: []
    };

    // ===== Состояние =====
    let state = {
      text: '',
      currentIndex: 0,
      startTime: null,
      isComplete: false,
      isPaused: false,
      correctChars: 0,
      totalChars: 0,
      errors: 0,
      category: 'all',
      difficulty: 5
    };

    // ===== Инициализация DOM =====
    function initElements() {
      elements.wpm = document.getElementById('wpm');
      elements.cpm = document.getElementById('cpm');
      elements.accuracy = document.getElementById('accuracy');
      elements.errors = document.getElementById('errors');
      elements.textContent = document.getElementById('text-content');
      elements.completionOverlay = document.getElementById('completion-overlay');
      elements.finalWpm = document.getElementById('final-wpm');
      elements.finalAccuracy = document.getElementById('final-accuracy');
      elements.finalTime = document.getElementById('final-time');
      elements.progressPercent = document.getElementById('progress-percent');
      elements.progressFill = document.getElementById('progress-fill');
      elements.progressBar = document.querySelector('.progress-bar');
      elements.hiddenInput = document.getElementById('hidden-input');
      elements.notification = document.getElementById('notification');
      elements.notificationIcon = document.getElementById('notification-icon');
      elements.notificationText = document.getElementById('notification-text');
    }

    // ===== Инициализация клавиатуры =====
    function initKeyboard() {
      const container = document.getElementById('keyboard-container');
      if (!container) return;

      const fragment = document.createDocumentFragment();

      KEYBOARD_LAYOUT.forEach((row, rowIndex) => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'keyboard-row';
        rowDiv.style.paddingLeft = `${rowIndex * 12}px`;

        row.forEach(key => {
          const keyDiv = document.createElement('div');
          keyDiv.className = 'key';
          keyDiv.dataset.key = key;
          keyDiv.textContent = key.toUpperCase();
          rowDiv.appendChild(keyDiv);
          elements.keys.push(keyDiv);
        });

        fragment.appendChild(rowDiv);
      });

      // Пробел
      const spaceRow = document.createElement('div');
      spaceRow.className = 'keyboard-row';
      const spaceKey = document.createElement('div');
      spaceKey.className = 'key key-space';
      spaceKey.dataset.key = ' ';
      spaceKey.textContent = 'ПРОБЕЛ';
      spaceRow.appendChild(spaceKey);
      fragment.appendChild(spaceRow);
      elements.keys.push(spaceKey);

      container.appendChild(fragment);
    }

    // ===== Генерация текста =====
    function generateText() {
      if (state.category === 'all') {
        const allWords = [...WORDS.easy, ...WORDS.medium, ...WORDS.hard];
        const length = 12 + Math.floor(state.difficulty / 2);
        return Array.from({ length }, () =>
          allWords[Math.floor(Math.random() * allWords.length)]
        ).join(' ');
      }

      const exercises = EXERCISES[state.category];
      if (exercises && exercises.length > 0) {
        return exercises[Math.floor(Math.random() * exercises.length)];
      }

      const words = state.difficulty <= 3 ? WORDS.easy :
                    state.difficulty <= 6 ? [...WORDS.easy, ...WORDS.medium] :
                    [...WORDS.easy, ...WORDS.medium, ...WORDS.hard];

      return Array.from({ length: 12 }, () =>
        words[Math.floor(Math.random() * words.length)]
      ).join(' ');
    }

    // ===== Отображение текста =====
    function renderText() {
      if (!elements.textContent) return;

      const fragment = document.createDocumentFragment();

      for (let i = 0; i < state.text.length; i++) {
        const span = document.createElement('span');
        span.className = 'char';
        const char = state.text[i];

        if (i < state.currentIndex) {
          const result = state.results[i];
          span.classList.add(result?.isCorrect ? 'correct' : 'incorrect');
        } else if (i === state.currentIndex && !state.isComplete) {
          span.classList.add('current');
        } else {
          span.classList.add('pending');
        }

        span.textContent = char === ' ' ? '␣' : char;
        fragment.appendChild(span);
      }

      elements.textContent.innerHTML = '';
      elements.textContent.appendChild(fragment);
    }

    // ===== Фокус инпута =====
    function focusInput() {
      if (elements.hiddenInput && !state.isComplete) {
        elements.hiddenInput.focus();
      }
    }

    // ===== Инициализация упражнения =====
    function initExercise() {
      state.text = generateText();
      state.currentIndex = 0;
      state.startTime = null;
      state.isComplete = false;
      state.isPaused = false;
      state.correctChars = 0;
      state.totalChars = 0;
      state.errors = 0;
      state.results = [];

      // Сброс статистики
      if (elements.wpm) elements.wpm.textContent = '0';
      if (elements.cpm) elements.cpm.textContent = '0';
      if (elements.accuracy) elements.accuracy.textContent = '100';
      if (elements.errors) elements.errors.textContent = '0';
      if (elements.progressPercent) elements.progressPercent.textContent = '0%';
      if (elements.progressFill) elements.progressFill.style.width = '0%';
      if (elements.progressBar) {
        elements.progressBar.setAttribute('aria-valuenow', '0');
      }

      // Скрытие оверлея
      if (elements.completionOverlay) {
        elements.completionOverlay.classList.remove('show');
      }

      // Сброс клавиатуры
      elements.keys.forEach(key => {
        key.classList.remove('active', 'correct', 'error');
      });

      renderText();
      focusInput();
    }

    // ===== Расчёт статистики =====
    function calculateStats() {
      if (!state.startTime) return null;

      const timeElapsed = (Date.now() - state.startTime) / 1000;
      const timeInMinutes = timeElapsed / 60;

      const wpm = timeInMinutes > 0 ? Math.round(state.correctChars / 5 / timeInMinutes) : 0;
      const cpm = timeInMinutes > 0 ? Math.round(state.correctChars / timeInMinutes) : 0;
      const accuracy = state.totalChars > 0
        ? Math.round((state.correctChars / state.totalChars) * 100)
        : 100;

      if (elements.wpm) elements.wpm.textContent = wpm;
      if (elements.cpm) elements.cpm.textContent = cpm;
      if (elements.accuracy) elements.accuracy.textContent = accuracy;
      if (elements.errors) elements.errors.textContent = state.errors;

      return { wpm, cpm, accuracy, timeElapsed };
    }

    // ===== Обновление прогресса =====
    function updateProgress() {
      const percent = Math.round((state.currentIndex / state.text.length) * 100);
      if (elements.progressPercent) elements.progressPercent.textContent = `${percent}%`;
      if (elements.progressFill) elements.progressFill.style.width = `${percent}%`;
      if (elements.progressBar) {
        elements.progressBar.setAttribute('aria-valuenow', percent);
      }
    }

    // ===== Подсветка клавиш =====
    function highlightKey(key, isCorrect) {
      const keyElement = elements.keys.find(k => k.dataset.key === key.toLowerCase());
      if (!keyElement) return;

      keyElement.classList.add('active');

      setTimeout(() => {
        keyElement.classList.remove('active');
        keyElement.classList.add(isCorrect ? 'correct' : 'error');

        setTimeout(() => {
          keyElement.classList.remove('correct', 'error');
        }, 200);
      }, 80);
    }

    // ===== Обработка ввода =====
    function handleInput(e) {
      if (state.isComplete || state.isPaused) return;

      const input = e.target;
      const value = input.value;

      if (!value || !state.text[state.currentIndex]) return;

      // Старт таймера при первом вводе
      if (!state.startTime) {
        state.startTime = Date.now();
      }

      const newChar = value[value.length - 1];
      const expectedChar = state.text[state.currentIndex];
      const isCorrect = newChar === expectedChar;

      if (isCorrect) {
        state.correctChars++;
      } else {
        state.errors++;
      }

      state.totalChars++;
      state.results[state.currentIndex] = { isCorrect, char: newChar };
      state.currentIndex++;

      // Подсветка клавиши
      highlightKey(expectedChar, isCorrect);

      // Обновление UI
      renderText();
      updateProgress();
      calculateStats();

      // Проверка завершения
      if (state.currentIndex >= state.text.length) {
        completeExercise();
      }

      // Очистка инпута
      input.value = '';
    }

    // ===== Завершение упражнения =====
    function completeExercise() {
      state.isComplete = true;

      const stats = calculateStats();

      if (stats) {
        if (elements.finalWpm) elements.finalWpm.textContent = stats.wpm;
        if (elements.finalAccuracy) elements.finalAccuracy.textContent = stats.accuracy;
        if (elements.finalTime) elements.finalTime.textContent = `${Math.round(stats.timeElapsed)}с`;
      }

      if (elements.completionOverlay) {
        elements.completionOverlay.classList.add('show');
      }

      showNotification('Упражнение завершено! 🎉', 'success');
    }

    // ===== Уведомления =====
    let notificationTimeout = null;

    function showNotification(text, type = 'success') {
      if (!elements.notification) return;

      if (notificationTimeout) {
        clearTimeout(notificationTimeout);
      }

      if (elements.notificationIcon) {
        elements.notificationIcon.textContent = type === 'success' ? '✓' : '✕';
      }
      if (elements.notificationText) {
        elements.notificationText.textContent = text;
      }

      elements.notification.className = `notification ${type} show`;

      notificationTimeout = setTimeout(() => {
        elements.notification.classList.remove('show');
      }, 3000);
    }

    // ===== Изменение категории =====
    function changeCategory(value) {
      state.category = value;
      initExercise();
    }

    // ===== Изменение сложности =====
    function changeDifficulty(value) {
      state.difficulty = parseInt(value, 10);
      initExercise();
    }

    // ===== Обработка клавиш =====
    function handleKeydown(e) {
      // Фокус при любой клавише
      if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey && !e.isComposing) {
        focusInput();
      }

      // Enter - новое упражнение
      if (e.key === 'Enter' && state.isComplete) {
        initExercise();
      }

      // Escape - пропуск
      if (e.key === 'Escape' && !state.isComplete) {
        showNotification('Упражнение пропущено', 'error');
        initExercise();
      }

      // Tab - фокус на контролы
      if (e.key === 'Tab') {
        elements.hiddenInput.blur();
      }
    }

    // ===== Инициализация =====
    function init() {
      initElements();
      initKeyboard();
      initExercise();

      // Слушатели событий
      elements.hiddenInput.addEventListener('input', handleInput, { passive: true });
      document.addEventListener('keydown', handleKeydown, { passive: true });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('select') && !e.target.closest('button') && !state.isComplete) {
          focusInput();
        }
      }, { passive: true });

      // Обработка потери фокуса
      document.addEventListener('visibilitychange', () => {
        if (document.hidden && !state.isComplete) {
          state.isPaused = true;
        } else if (!document.hidden && !state.isComplete) {
          state.isPaused = false;
          focusInput();
        }
      });
    }

    // Запуск после загрузки DOM
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
